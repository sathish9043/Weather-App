<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App UI</title>
  <link rel="stylesheet" href="weatherapp.css">
</head>
<body>

  <div class="weather-card">

    <div class="search-box">
      <input class="input" type="text" placeholder="Enter city name">
      <button class="btn">🔍</button>
    </div>

    <div class="weather-info">
      <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="weather icon">

      <h1 class="celcius">28°C</h1>
      <h2 class="location">Madurai</h2>

      <div class="details">

        <div class="col">
          <div>
            <h3 class="humidity">65%</h3>
            <p>Humidity</p>
          </div>
        </div>

        <div class="col">
          <div>
            <h3 class="windspeed">12 km/h</h3>
            <p>Wind Speed</p>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="weatherapp.js"></script>
</body>
</html>
